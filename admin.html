<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者画面 — パズルポイ活</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

  authDomain: "puzzle-poikatsu.firebaseapp.com",
  projectId: "puzzle-poikatsu",

  messagingSenderId: "519778434293",

  measurementId: "G-K01NCF9CQ8"

<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDyZccmn4yAjNdBKTXi67vLlxazvK1y6jw",
  authDomain:        "puzzle-poikatsu.firebaseapp.com",
  projectId:         "puzzle-poikatsu",
  storageBucket:     "puzzle-poikatsu.firebasestorage.app",
  messagingSenderId: "519778434293",
  appId:             "1:519778434293:web:0b689467cc4a713fd759bc"
};

// ██████████████████████████████████████████
// 🔧 管理者パスワード（英数字で自由に設定）
//    このパスワードを知っている人だけ管理画面に入れます
const ADMIN_PASSWORD = "reoreo8876";
// ██████████████████████████████████████████
</script>

<script type="module">
import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, orderBy,
         getDocs, doc, updateDoc, onSnapshot,
         serverTimestamp, where }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);
window._db  = db;
window._fsa = { collection, query, orderBy, getDocs, doc, updateDoc,
                onSnapshot, serverTimestamp, where };
window.addEventListener("load", () => window._adminInit());
</script>

<style>
:root {
  --bg:#f0f4f8; --card:#fff; --dark:#1a1a2e;
  --lime:#c8f55a; --coral:#ff6b6b; --mint:#5af5c8;
  --gold:#ffb800; --muted:#888; --shadow:0 2px 12px rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}

/* Login */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;}
.login-box{background:var(--card);border-radius:20px;padding:40px 32px;box-shadow:var(--shadow);width:320px;text-align:center;}
.login-logo{font-family:'Fredoka One',cursive;font-size:22px;color:var(--dark);margin-bottom:4px;}
.login-logo span{color:var(--coral);}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.login-input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:12px;font-size:15px;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color 0.2s;}
.login-input:focus{border-color:var(--dark);}
.login-btn{width:100%;margin-top:12px;padding:14px;background:var(--dark);color:var(--lime);border:none;border-radius:12px;font-family:'Fredoka One',cursive;font-size:17px;cursor:pointer;letter-spacing:1px;}
.login-err{color:var(--coral);font-size:13px;margin-top:8px;display:none;}

/* Dashboard */
#dashboard{display:none;}
.topbar{background:var(--dark);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{font-family:'Fredoka One',cursive;font-size:20px;color:var(--lime);}
.topbar-logo span{color:var(--coral);}
.topbar-right{display:flex;align-items:center;gap:16px;}
.badge-count{background:var(--coral);color:#fff;border-radius:20px;padding:3px 12px;font-size:13px;font-weight:700;}
.logout-btn{background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;}

.main{max-width:960px;margin:0 auto;padding:24px 16px;}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--card);border-radius:14px;padding:16px;box-shadow:var(--shadow);text-align:center;}
.stat-num{font-family:'Fredoka One',cursive;font-size:28px;color:var(--dark);}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:4px;}

/* Filter tabs */
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-tab{padding:8px 18px;border:none;border-radius:20px;background:#e8e8f0;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.filter-tab.active{background:var(--dark);color:var(--lime);}

/* Request cards */
.req-list{display:grid;gap:12px;}
.req-card{background:var(--card);border-radius:16px;padding:20px;box-shadow:var(--shadow);border-left:4px solid #ddd;}
.req-card.pending  {border-left-color:var(--gold);}
.req-card.approved {border-left-color:var(--mint);}
.req-card.sent     {border-left-color:#5ac8f5;}
.req-card.rejected {border-left-color:var(--coral);}
.req-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.req-avatar{width:40px;height:40px;border-radius:50%;background:#ede8ff;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0;}
.req-avatar img{width:100%;height:100%;object-fit:cover;}
.req-user{flex:1;}
.req-username{font-weight:700;font-size:15px;}
.req-userid{font-size:11px;color:var(--muted);margin-top:2px;word-break:break-all;}
.req-item-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.req-item-name{font-size:16px;font-weight:700;}
.req-pts{font-family:'Fredoka One',cursive;font-size:20px;color:var(--coral);}
.req-date{font-size:12px;color:var(--muted);}
.status-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.status-badge.pending  {background:#fff3cd;color:#856404;}
.status-badge.approved {background:#d4edda;color:#155724;}
.status-badge.sent     {background:#cce5ff;color:#004085;}
.status-badge.rejected {background:#f8d7da;color:#721c24;}

/* Admin actions */
.admin-actions{display:flex;flex-direction:column;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f0;}
.action-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.code-input{flex:1;min-width:180px;padding:10px 14px;border:2px solid #e0e0e0;border-radius:10px;font-family:monospace;font-size:14px;outline:none;}
.code-input:focus{border-color:var(--mint);}
.note-input{width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;resize:none;}
.note-input:focus{border-color:var(--muted);}
.act-btn{padding:10px 18px;border:none;border-radius:10px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity 0.15s;white-space:nowrap;}
.act-btn:active{opacity:0.7;}
.act-btn.approve{background:#d4edda;color:#155724;}
.act-btn.send   {background:var(--dark);color:var(--lime);}
.act-btn.reject {background:#f8d7da;color:#721c24;}

/* existing gift code display */
.code-display{background:#f0fff4;border:1px solid var(--mint);border-radius:8px;padding:10px 14px;font-family:monospace;font-size:14px;margin-top:6px;word-break:break-all;}

.empty-msg{text-align:center;color:var(--muted);padding:60px 0;font-size:14px;}
.loading-msg{text-align:center;color:var(--muted);padding:40px 0;}

@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .action-row{flex-direction:column;align-items:stretch;}
  .act-btn{width:100%;}
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">PUZZLE<span>ポイ</span></div>
    <div class="login-sub">管理者ログイン</div>
    <input class="login-input" type="password" id="pwInput" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="loginErr">パスワードが違います</div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">PUZZLE<span>ポイ</span> 管理画面</div>
    <div class="topbar-right">
      <span class="badge-count" id="pendingCount">0件 審査中</span>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <div class="main">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="statTotal">—</div><div class="stat-lbl">総申請数</div></div>
      <div class="stat-card"><div class="stat-num" id="statPending" style="color:var(--gold)">—</div><div class="stat-lbl">審査中</div></div>
      <div class="stat-card"><div class="stat-num" id="statSent" style="color:#5ac8f5">—</div><div class="stat-lbl">送信済み</div></div>
      <div class="stat-card"><div class="stat-num" id="statUsers">—</div><div class="stat-lbl">ユーザー数</div></div>
    </div>

    <!-- Filter -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterReqs('all',this)">すべて</button>
      <button class="filter-tab" onclick="filterReqs('pending',this)">⏳ 審査中</button>
      <button class="filter-tab" onclick="filterReqs('approved',this)">✅ 承認済み</button>
      <button class="filter-tab" onclick="filterReqs('sent',this)">📨 送信済み</button>
      <button class="filter-tab" onclick="filterReqs('rejected',this)">❌ 却下</button>
    </div>

    <div class="req-list" id="reqList">
      <div class="loading-msg">⏳ 読み込み中...</div>
    </div>
  </div>
</div>

<script>
let allRequests = [];
let currentFilter = "all";

// ── LOGIN ────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById("pwInput").value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadRequests();
  } else {
    document.getElementById("loginErr").style.display = "block";
  }
}
function doLogout() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("pwInput").value = "";
}

window._adminInit = function() {
  // 既にログイン状態なら（セッション保持は未実装のため毎回ログインが必要）
};

// ── LOAD ────────────────────────────────────────────────
async function loadRequests() {
  const { collection, query, orderBy, getDocs } = window._fsa;
  const db = window._db;
  try {
    const [reqSnap, userSnap] = await Promise.all([
      getDocs(query(collection(db, "exchanges"), orderBy("createdAt", "desc"))),
      getDocs(collection(db, "users"))
    ]);

    allRequests = reqSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const userCount = userSnap.size;

    // Stats
    const pending  = allRequests.filter(r => r.status === "pending").length;
    const sent     = allRequests.filter(r => r.status === "sent").length;
    document.getElementById("statTotal").textContent   = allRequests.length;
    document.getElementById("statPending").textContent = pending;
    document.getElementById("statSent").textContent    = sent;
    document.getElementById("statUsers").textContent   = userCount;
    document.getElementById("pendingCount").textContent= `${pending}件 審査中`;

    renderRequests();
  } catch(e) {
    console.error(e);
    document.getElementById("reqList").innerHTML = '<div class="empty-msg">⚠️ 読み込みに失敗しました</div>';
  }
}

// ── FILTER ──────────────────────────────────────────────
function filterReqs(status, btn) {
  currentFilter = status;
  document.querySelectorAll(".filter-tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderRequests();
}

// ── RENDER ──────────────────────────────────────────────
function renderRequests() {
  const filtered = currentFilter === "all"
    ? allRequests
    : allRequests.filter(r => r.status === currentFilter);

  if (!filtered.length) {
    document.getElementById("reqList").innerHTML = '<div class="empty-msg">該当する申請がありません</div>';
    return;
  }

  const statusLabel = { pending:"⏳ 審査中", approved:"✅ 承認済み", sent:"📨 送信済み", rejected:"❌ 却下" };

  document.getElementById("reqList").innerHTML = filtered.map(r => {
    const ts = r.createdAt?.toDate ? r.createdAt.toDate() : new Date();
    const dateStr = `${ts.getFullYear()}/${ts.getMonth()+1}/${ts.getDate()} ${ts.getHours()}:${String(ts.getMinutes()).padStart(2,"0")}`;
    const avatar = r.pictureUrl
      ? `<img src="${r.pictureUrl}" alt="">`
      : `<span>👤</span>`;

    // 送信済みの場合はコード表示のみ
    const codeSection = r.giftCode
      ? `<div class="code-display">🎁 送信済みコード: <strong>${r.giftCode}</strong></div>`
      : "";

    // アクションUI（ステータスに応じて変化）
    let actionHtml = "";
    if (r.status === "pending") {
      actionHtml = `
        <div class="action-row">
          <textarea class="note-input" id="note_${r.id}" rows="1" placeholder="管理者メモ（任意）">${r.adminNote||""}</textarea>
        </div>
        <div class="action-row">
          <button class="act-btn approve" onclick="updateStatus('${r.id}','approved')">✅ 承認する</button>
          <button class="act-btn reject"  onclick="updateStatus('${r.id}','rejected')">❌ 却下する</button>
        </div>`;
    } else if (r.status === "approved") {
      actionHtml = `
        <div class="action-row">
          <input class="code-input" id="code_${r.id}" type="text" placeholder="ギフトコードを入力" value="${r.giftCode||""}">
          <button class="act-btn send" onclick="sendGiftCode('${r.id}')">📨 コードを送信</button>
        </div>
        <div class="action-row">
          <textarea class="note-input" id="note_${r.id}" rows="1" placeholder="管理者メモ（任意）">${r.adminNote||""}</textarea>
          <button class="act-btn reject" onclick="updateStatus('${r.id}','rejected')">❌ 却下</button>
        </div>`;
    }

    return `
      <div class="req-card ${r.status}" id="card_${r.id}">
        <div class="req-head">
          <div class="req-avatar">${avatar}</div>
          <div class="req-user">
            <div class="req-username">${r.displayName || "不明"}</div>
            <div class="req-userid">UID: ${r.userId}</div>
          </div>
          <span class="status-badge ${r.status}">${statusLabel[r.status]||r.status}</span>
        </div>
        <div class="req-item-row">
          <div class="req-item-name">${r.icon||"🎁"} ${r.item}</div>
          <div class="req-pts">-${r.cost} PT</div>
        </div>
        <div class="req-date">申請日時: ${dateStr}</div>
        ${codeSection}
        ${actionHtml ? `<div class="admin-actions">${actionHtml}</div>` : ""}
      </div>`;
  }).join("");
}

// ── UPDATE STATUS ─────────────────────────────────────
async function updateStatus(reqId, newStatus) {
  const { doc, updateDoc, serverTimestamp } = window._fsa;
  const noteEl = document.getElementById("note_" + reqId);
  const note = noteEl ? noteEl.value : "";
  try {
    await updateDoc(doc(window._db, "exchanges", reqId), {
      status:     newStatus,
      adminNote:  note,
      updatedAt:  serverTimestamp(),
    });
    // ローカルも更新
    const req = allRequests.find(r => r.id === reqId);
    if (req) { req.status = newStatus; req.adminNote = note; }
    renderRequests();
    showToast(newStatus === "approved" ? "✅ 承認しました" : "❌ 却下しました");
  } catch(e) {
    console.error(e);
    showToast("⚠️ 更新に失敗しました");
  }
}

// ── SEND GIFT CODE ────────────────────────────────────
async function sendGiftCode(reqId) {
  const codeEl = document.getElementById("code_" + reqId);
  const noteEl = document.getElementById("note_" + reqId);
  const code = codeEl ? codeEl.value.trim() : "";
  if (!code) { showToast("⚠️ ギフトコードを入力してください"); return; }
  const { doc, updateDoc, serverTimestamp } = window._fsa;
  try {
    await updateDoc(doc(window._db, "exchanges", reqId), {
      status:    "sent",
      giftCode:  code,
      adminNote: noteEl ? noteEl.value : "",
      updatedAt: serverTimestamp(),
    });
    const req = allRequests.find(r => r.id === reqId);
    if (req) { req.status = "sent"; req.giftCode = code; }
    renderRequests();
    showToast("📨 ギフトコードを登録しました！");
  } catch(e) {
    console.error(e);
    showToast("⚠️ 送信に失敗しました");
  }
}

// ── TOAST ─────────────────────────────────────────────
function showToast(msg) {
  let t = document.querySelector(".admin-toast");
  if (t) t.remove();
  t = document.createElement("div");
  t.className = "admin-toast";
  t.textContent = msg;
  t.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#c8f55a;padding:12px 22px;border-radius:12px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap;animation:tIn 0.3s ease";
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}
</script>
<style>
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</body>
</html>
